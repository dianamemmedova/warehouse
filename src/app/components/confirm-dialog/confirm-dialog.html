<h2 mat-dialog-title class="dialog-title" [class.danger]="data.isDanger">
  @if (data.isDanger) {
    <mat-icon>warning</mat-icon>
  }
  {{ data.title }}
</h2>

<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="cancel()">
    {{ data.cancelText || 'Ləğv et' }}
  </button>
  <button
    mat-flat-button
    [color]="data.isDanger ? 'warn' : 'primary'"
    (click)="confirm()">
    {{ data.confirmText || 'Təsdiqlə' }}
  </button>
</mat-dialog-actions>
